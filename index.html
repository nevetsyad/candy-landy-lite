// Core: Move, Jump, Dash, Collect, Win

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- AUDIO (Web Audio API) ---
const audio = {
    ctx: null,
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    play(freq, duration, type = 'square', volume = 0.15) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    jump() { this.play(400, 0.1); this.play(600, 0.1); },
    collect() { this.play(880, 0.08); setTimeout(() => this.play(1100, 0.12), 50); },
    dash() { this.play(200, 0.15, 'sawtooth'); },
    hurt() { this.play(150, 0.2, 'sawtooth', 0.2); },
    win() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.play(f, 0.2), i * 100)); },
    die() { this.play(200, 0.3, 'sawtooth', 0.1); setTimeout(() => this.play(150, 0.4, 'sawtooth', 0.08), 150); }
};

// --- PARTICLES ---
const particles = [];
function spawnParticle(x, y, color, count = 8, opts = {}) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * (opts.spread || 8),
            vy: (Math.random() - 0.5) * (opts.spread || 8) - 2,
            life: 1,
            color,
            size: opts.size || (3 + Math.random() * 4),
            gravity: opts.gravity ?? 0.15
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.life -= 0.025;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

// --- SCREEN SHAKE ---
let shakeTime = 0, shakeIntensity = 0;
function shake(intensity = 5) { shakeTime = 10; shakeIntensity = intensity; }
function applyShake() {
    if (shakeTime > 0) {
        ctx.translate(
            (Math.random() - 0.5) * shakeIntensity,
            (Math.random() - 0.5) * shakeIntensity
        );
        shakeTime--;
    }
}

// --- PLAYER ---
const player = {
    x: 30, y: 500,
    vx: 0, vy: 0,
    width: 32, height: 44,
    speed: 5,
    jumpPower: -14,
    grounded: false,
    facing: 1,
    canDash: true,
    isDashing: false,
    dashTimer: 0,
    invincible: 0,
    lives: 3,
    
    update(platforms) {
        // Horizontal movement
        if (keys.left) { this.vx = -this.speed; this.facing = -1; }
        else if (keys.right) { this.vx = this.speed; this.facing = 1; }
        else this.vx *= 0.8;
        
        // Dash
        if (keys.dash && this.canDash && this.grounded && !this.isDashing) {
            this.isDashing = true;
            this.dashTimer = 8;
            this.canDash = false;
            this.vx = this.facing * 20;
            this.invincible = 10;
            audio.dash();
            spawnParticle(this.x + this.width/2, this.y + this.height/2, '#ffff00', 12, { spread: 6 });
        }
        
        if (this.isDashing) {
            this.dashTimer--;
            if (this.dashTimer <= 0) this.isDashing = false;
        }
        
        // Reset dash when grounded
        if (this.grounded) this.canDash = true;
        
        // Gravity
        this.vy += this.isDashing ? 0.3 : 0.6;
        if (this.vy > 15) this.vy = 15;
        
        // Apply velocity
        this.x += this.vx;
        this.y += this.vy;
        
        // Platform collision
        this.grounded = false;
        platforms.forEach(p => {
            if (this.x < p.x + p.width && this.x + this.width > p.x &&
                this.y + this.height > p.y && this.y + this.height < p.y + p.height + this.vy + 5 &&
                this.vy >= 0) {
                this.y = p.y - this.height;
                this.vy = 0;
                this.grounded = true;
            }
        });
        
        // Jump (with coyote time buffer)
        if (keys.jump && this.grounded) {
            this.vy = this.jumpPower;
            this.grounded = false;
            audio.jump();
            spawnParticle(this.x + this.width/2, this.y + this.height, '#ffb6c1', 5, { spread: 4, gravity: 0.1 });
        }
        
        // Screen bounds
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        
        // Invincibility timer
        if (this.invincible > 0) this.invincible--;
    },
    
    draw() {
        ctx.save();
        
        // Flash when invincible
        if (this.invincible > 0 && Math.floor(this.invincible / 3) % 2) {
            ctx.globalAlpha = 0.5;
        }
        
        // Dash trail
        if (this.isDashing) {
            ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.fillRect(this.x - this.facing * 20, this.y, this.width, this.height);
        }
        
        // Body (dress)
        ctx.fillStyle = '#ff69b4';
        ctx.beginPath();
        ctx.moveTo(this.x + this.width/2, this.y + 20);
        ctx.lineTo(this.x + this.width - 4, this.y + this.height);
        ctx.lineTo(this.x + 4, this.y + this.height);
        ctx.closePath();
        ctx.fill();
        
        // Head
        ctx.fillStyle = '#ffd699';
        ctx.beginPath();
        ctx.arc(this.x + this.width/2, this.y + 14, 12, 0, Math.PI * 2);
        ctx.fill();
        
        // Hair (pigtails)
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(this.x + this.width/2, this.y + 8, 14, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(this.x - 4, this.y + 4, 8, 12); // left pigtail
        ctx.fillRect(this.x + this.width - 4, this.y + 4, 8, 12); // right pigtail
        
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x + this.width/2 - 6, this.y + 12, 3, 4);
        ctx.fillRect(this.x + this.width/2 + 3, this.y + 12, 3, 4);
        
        ctx.restore();
    },
    
    reset() {
        this.x = 30; this.y = 500;
        this.vx = 0; this.vy = 0;
        this.grounded = false;
        this.isDashing = false;
        this.invincible = 0;
    }
};

// --- ENEMIES ---
class Enemy {
    constructor(x, y, range) {
        this.x = x; this.y = y;
        this.startX = x;
        this.range = range;
        this.width = 30; this.height = 30;
        this.vx = 1.5;
    }
    
    update() {
        this.x += this.vx;
        if (this.x < this.startX - this.range || this.x > this.startX + this.range) {
            this.vx *= -1;
        }
    }
    
    draw() {
        // Body
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x + 10, this.y + 12, 5, 0, Math.PI * 2);
        ctx.arc(this.x + 20, this.y + 12, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x + 10, this.y + 12, 2, 0, Math.PI * 2);
        ctx.arc(this.x + 20, this.y + 12, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

// --- GAME STATE ---
let state = 'start'; // start, playing, win, gameover
let currentLevel = 0;
let score = 0;
let highScore = parseInt(localStorage.getItem('candyLandyLite') || '0');
let levelCandies = [];
let levelHearts = [];
let levelEnemies = [];
let levelPlatforms = [];
let levelGoal = {};

// --- INPUT ---
const keys = { left: false, right: false, jump: false, dash: false };
document.addEventListener('keydown', e => {
    audio.init();
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') keys.jump = true;
    if (e.key === 'Shift') keys.dash = true;
    
    if (e.key === 'Enter' || e.key === ' ') {
        if (state === 'start') startLevel(0);
        else if (state === 'win' || state === 'gameover') resetGame();
    }
    if (e.key === 'Escape' && state === 'playing') state = 'paused';
    else if (e.key === 'Escape' && state === 'paused') state = 'playing';
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') keys.jump = false;
    if (e.key === 'Shift') keys.dash = false;
});

// --- LEVEL MANAGEMENT ---
function startLevel(idx) {
    currentLevel = idx;
    const level = levels[idx];
    levelPlatforms = level.platforms.map(p => ({...p}));
    levelCandies = level.candies.map(c => ({...c, collected: false}));
    levelHearts = (level.hearts || []).map(h => ({...h, collected: false}));
    levelEnemies = level.enemies.map(e => new Enemy(e.x, e.y, e.range));
    levelGoal = {...level.goal};
    player.reset();
    state = 'playing';
}

function nextLevel() {
    if (currentLevel + 1 >= levels.length) {
        state = 'win';
        audio.win();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('candyLandyLite', highScore);
        }
    } else {
        startLevel(currentLevel + 1);
    }
}

function resetGame() {
    score = 0;
    player.lives = 3;
    startLevel(0);
}

// --- COLLISION ---
function checkCollisions() {
    const px = player.x, py = player.y, pw = player.width, ph = player.height;
    
    // Candies
    levelCandies.forEach(c => {
        if (!c.collected && px < c.x + 20 && px + pw > c.x && py < c.y + 20 && py + ph > c.y) {
            c.collected = true;
            score += 10;
            audio.collect();
            // Red and white peppermint particles
            spawnParticle(c.x + 10, c.y + 10, '#ff0000', 5, { spread: 5 });
            spawnParticle(c.x + 10, c.y + 10, '#ffffff', 5, { spread: 5 });
            shake(3);
        }
    });
    
    // Hearts (extra lives) - max 5 lives
    levelHearts.forEach(h => {
        if (!h.collected && player.lives < 5 && px < h.x + 24 && px + pw > h.x && py < h.y + 24 && py + ph > h.y) {
            h.collected = true;
            player.lives++;
            audio.collect();
            spawnParticle(h.x + 12, h.y + 12, '#ff69b4', 12, { spread: 6 });
            shake(4);
        }
    });
    
    // Enemies
    levelEnemies.forEach(e => {
        if (player.invincible > 0 || player.isDashing) return;
        if (e.x < -100) return; // Already removed
        if (px < e.x + e.width && px + pw > e.x && py < e.y + e.height && py + ph > e.y) {
            // Stomp from above
            if (player.vy > 0 && py + ph - 10 < e.y + e.height/2) {
                const ex = e.x + e.width/2;
                const ey = e.y + e.height/2;
                player.vy = -10;
                e.x = -999; // Remove
                score += 50;
                audio.collect();
                spawnParticle(ex, ey, '#ff4444', 15, { spread: 8 });
                shake(6);
            } else {
                // Take damage
                player.lives--;
                player.invincible = 60;
                player.vy = -8;
                player.vx = -player.facing * 5;
                audio.hurt();
                shake(8);
                if (player.lives <= 0) {
                    state = 'gameover';
                    audio.die();
                }
            }
        }
    });
    
    // Goal
    const allCollected = levelCandies.every(c => c.collected);
    if (allCollected && px < levelGoal.x + 40 && px + pw > levelGoal.x && py < levelGoal.y + 50 && py + ph > levelGoal.y) {
        spawnParticle(levelGoal.x + 20, levelGoal.y + 25, '#00ff00', 20, { spread: 10 });
        shake(5);
        nextLevel();
    }
    
    // Fall off screen
    if (player.y > canvas.height + 50 && player.invincible <= 0) {
        player.lives--;
        if (player.lives <= 0) {
            state = 'gameover';
            audio.die();
        } else {
            player.reset();
            player.invincible = 30;
        }
    }
}

// --- DRAWING ---
function drawBackground() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(1, '#E0F6FF');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    [[100, 80], [400, 60], [650, 100]].forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
        ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawPlatforms() {
    levelPlatforms.forEach(p => {
        const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
        grad.addColorStop(0, '#ff69b4');
        grad.addColorStop(1, '#ff1493');
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x + 2, p.y + 2, p.width - 4, p.height - 4);
    });
}

function drawCandies() {
    levelCandies.forEach(c => {
        if (c.collected) return;
        const bounce = Math.sin(Date.now() / 200) * 3;
        const x = c.x + 10;
        const y = c.y + 10 + bounce;
        const r = 10;
        
        // Peppermint candy - red and white stripes
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.clip();
        
        // White base
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - r, y - r, r * 2, r * 2);
        
        // Red stripes
        ctx.fillStyle = '#ff0000';
        for (let i = -r; i < r; i += 6) {
            ctx.fillRect(x + i, y - r, 3, r * 2);
        }
        
        ctx.restore();
        
        // Outline
        ctx.strokeStyle = '#cc0000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(x - 3, y - 3, 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawHearts() {
    levelHearts.forEach(h => {
        if (h.collected) return;
        const bounce = Math.sin(Date.now() / 300) * 4;
        const x = h.x + 12;
        const y = h.y + 12 + bounce;
        const size = 10;
        
        ctx.fillStyle = '#ff1493';
        ctx.beginPath();
        ctx.moveTo(x, y + size / 4);
        ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size / 4);
        ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
        ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size / 4);
        ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size / 4);
        ctx.fill();
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(x - 4, y + 4, 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawGoal() {
    const allCollected = levelCandies.every(c => c.collected);
    const bounce = Math.sin(Date.now() / 150) * 5;
    
    ctx.fillStyle = allCollected ? '#00ff00' : '#888';
    ctx.beginPath();
    ctx.moveTo(levelGoal.x + 20, levelGoal.y + bounce);
    ctx.lineTo(levelGoal.x + 40, levelGoal.y + 20 + bounce);
    ctx.lineTo(levelGoal.x, levelGoal.y + 20 + bounce);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.fillRect(levelGoal.x + 17, levelGoal.y + 20 + bounce, 6, 30);
}

function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(10, 10, 200, 70);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Comic Sans MS';
    ctx.fillText(`Score: ${score}`, 20, 35);
    ctx.fillText(`Best: ${highScore}`, 20, 55);
    // Cap lives display at 5 to prevent overflow
    const livesDisplay = player.lives > 5 ? `Lives: ${player.lives} ❤️` : `Lives: ${'❤️'.repeat(player.lives)}`;
    ctx.fillText(livesDisplay, 20, 75);
    
    // Level indicator
    ctx.fillText(`Level ${currentLevel + 1}: ${levels[currentLevel]?.name || ''}`, canvas.width - 200, 35);
    
    // Candies remaining
    const remaining = levelCandies.filter(c => !c.collected).length;
    if (remaining > 0) {
        ctx.fillText(`Candies: ${remaining}`, canvas.width - 200, 55);
    } else {
        ctx.fillStyle = '#00ff00';
        ctx.fillText('Reach the star!', canvas.width - 200, 55);
    }
}

function drawScreen(text, subtext, color = '#fff') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = color;
    ctx.font = 'bold 48px Comic Sans MS';
    ctx.textAlign = 'center';
    ctx.fillText(text, canvas.width/2, canvas.height/2 - 30);
    ctx.font = '24px Comic Sans MS';
    ctx.fillStyle = '#fff';
    ctx.fillText(subtext, canvas.width/2, canvas.height/2 + 20);
    ctx.textAlign = 'left';
}

// --- MAIN LOOP ---
function gameLoop() {
    ctx.save();
    applyShake();
    
    drawBackground();
    
    if (state === 'start') {
        drawScreen('🍬 Candy Landy 🍬', 'Press SPACE or ENTER to start!', '#ff69b4');
    } else if (state === 'playing' || state === 'paused') {
        if (state === 'playing') {
            player.update(levelPlatforms);
            levelEnemies.forEach(e => e.update());
            checkCollisions();
        }
        
        drawPlatforms();
        drawCandies();
        drawHearts();
        levelEnemies.forEach(e => e.draw());
        drawGoal();
        player.draw();
        updateParticles();
        drawParticles();
        drawHUD();
        
        if (state === 'paused') {
            drawScreen('PAUSED', 'Press ESC to resume', '#ff69b4');
        }
    } else if (state === 'win') {
        drawScreen('🎉 YOU WIN! 🎉', `Final Score: ${score} | Press ENTER to play again`, '#00ff00');
    } else if (state === 'gameover') {
        drawScreen('💀 GAME OVER 💀', `Score: ${score} | Press ENTER to retry`, '#ff4444');
    }
    
    ctx.restore();
    requestAnimationFrame(gameLoop);
}

// Start!
gameLoop();
</script>
